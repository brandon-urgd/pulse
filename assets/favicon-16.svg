<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Favicon 16×16 — Cursive P into pulse spike, all #7a9e87 -->
  <rect width="16" height="16" rx="2" fill="#0a0f14"/>
  <rect x="0.5" y="0.5" width="15" height="15" rx="1.75" fill="none" stroke="#7a9e87" stroke-opacity="0.3" stroke-width="0.5"/>
  <!-- P stem -->
  <line x1="2.5" y1="3" x2="2.5" y2="13" stroke="#7a9e87" stroke-width="1.8" stroke-linecap="round"/>
  <!-- P bowl -->
  <path d="M 2.5 3 L 6.5 3 C 8.5 3 9.5 4.5 9.5 6.5 C 9.5 8.5 8.5 10 6.5 10 L 2.5 10" fill="none" stroke="#7a9e87" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pulse spike from bottom of bowl -->
  <path d="M 6.5 10 L 9 10 L 10.5 7 L 12 12 L 13.5 10 L 15 10" fill="none" stroke="#7a9e87" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
