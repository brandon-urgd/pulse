<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Pulse Avatar 48×48 — Cursive P into pulse spike, all #7a9e87 -->
  <rect width="48" height="48" rx="24" fill="#0a0f14"/>
  <circle cx="24" cy="24" r="22.5" fill="none" stroke="#7a9e87" stroke-opacity="0.3" stroke-width="1"/>
  <!-- P stem -->
  <line x1="10" y1="10" x2="10" y2="38" stroke="#7a9e87" stroke-width="3" stroke-linecap="round"/>
  <!-- P bowl -->
  <path d="M 10 10 L 20 10 C 24 10 27 13 27 19 C 27 25 24 28 20 28 L 10 28" fill="none" stroke="#7a9e87" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pulse spike from bottom of bowl -->
  <path d="M 20 28 L 26 28 L 29 22 L 33 34 L 37 20 L 40 28 L 44 28" fill="none" stroke="#7a9e87" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
