  PulseInviteReviewerFunction:
    Type: AWS::Lambda::Function
    DependsOn: PulseInviteReviewerLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-inviteReviewer-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt PulseInviteReviewerFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref InviteReviewerCodeKey
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: !FindInMap [Concurrency, !Ref Environment, InviteReviewer]
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          SESSIONS_TABLE: !Ref PulseSessionsTable
          ITEMS_TABLE: !Ref PulseItemsTable
          TENANTS_TABLE: !Ref PulseTenantsTable
          DATA_BUCKET: !Ref PulseDataBucket
          CORS_ALLOWED_ORIGINS: !Sub 'https://${FrontendDomainName}'
          APP_URL: !Sub 'https://${FrontendDomainName}'
          ALERTS_TOPIC_ARN: !Ref PulseAlertsTopic
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseInviteReviewerFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PulseInviteReviewerFunction
      Action: lambda:InvokeFunction
