  SavePCDecisionsCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-savePCDecisions/latest.zip
    Description: S3 key for urgd-pulse-savePCDecisions Lambda ZIP

  UsageReportCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-usageReport/latest.zip
    Description: S3 key for urgd-pulse-usageReport Lambda ZIP

  GenerateRevisionCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-generateRevision/latest.zip
    Description: S3 key for urgd-pulse-generateRevision Lambda ZIP

  GetRevisionsCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-getRevisions/latest.zip
    Description: S3 key for urgd-pulse-getRevisions Lambda ZIP

  SendPulseCheckReadyCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-sendPulseCheckReady/latest.zip
    Description: S3 key for urgd-pulse-sendPulseCheckReady Lambda ZIP

  DeploymentVersion:
    Type: String
    Default: 'local'
    Description: Git commit SHA injected at deploy time to force API Gateway redeployment

  QuarantineBucketName:
    Type: String
    Default: ''
    Description: Shield quarantine bucket name (from Shield stack SSM parameter /urgd/shield/quarantine_bucket_name)

  ShieldEventBridgeRuleArn:
    Type: String
    Description: Shield EventBridge rule ARN (from SSM parameter /urgd/shield/eventbridge_rule_arn)

  PublicSignup:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Whether public self-registration is enabled

  AppleClientId:
    Type: String
    Default: ''
    Description: Apple Sign In client ID (bundle ID) — leave empty to skip Apple IdP

  AppleTeamId:
    Type: String
    Default: ''
    Description: Apple developer team ID — leave empty to skip Apple IdP

  AppleKeyId:
    Type: String
    Default: ''
    Description: Apple Sign In key ID — leave empty to skip Apple IdP

  ApplePrivateKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: Apple Sign In private key (PEM) — leave empty to skip Apple IdP

  GoogleClientId:
    Type: String
    Default: ''
    Description: Google OAuth client ID — leave empty to skip Google IdP

  GoogleClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Google OAuth client secret — leave empty to skip Google IdP

  UrgdStudiosHostedZoneId:
    Type: String
    Default: Z0338626TGE7PTZDLIT1
    Description: Route53 hosted zone ID for urgdstudios.com

  MonitoringEmail:
    Type: String
    Default: alerts@urgd.dev
    Description: Email for P0 alert notifications

  CriticalAlertsEmail:
    Type: String
    Default: critical@urgd.dev
    Description: Email for critical alert notifications

# ─── Conditions ───────────────────────────────────────────────────────────────
Conditions:
  IsProduction: !Equals [!Ref Environment, prod]

# ─── Mappings ─────────────────────────────────────────────────────────────────
Mappings:
  EnvConfig:
    dev:
      LogRetentionDays: 7
    staging:
      LogRetentionDays: 14
    prod:
      LogRetentionDays: 30

  # ReservedConcurrentExecutions per function per environment
  # dev: 3 flat, staging: 5 flat, prod: tiered
  Concurrency:
    dev:
      Health: 3
      BedrockHealth: 3
      CognitoAuth: 3
      SessionAuth: 3
      Register: 3
      CreateTenant: 3
      GetSettings: 3
      UpdateSettings: 3
      DeleteAccount: 3
