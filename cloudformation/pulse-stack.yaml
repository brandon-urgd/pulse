  # ══════════════════════════════════════════════════════════════════════════════
  # S4: CloudWatch Alarms (P1)
  # ══════════════════════════════════════════════════════════════════════════════

  PulseBedrockLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'urgd-pulse-${Environment}-bedrock-latency'
      AlarmDescription: Bedrock p99 latency exceeded 10 seconds
      Namespace: Pulse/Chat
      MetricName: BedrockLatency
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref PulseAlertsTopic
      OKActions:
        - !Ref PulseAlertsTopic
      TreatMissingData: notBreaching

  PulseBedrockErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'urgd-pulse-${Environment}-bedrock-errors'
      AlarmDescription: Bedrock error rate exceeded 5% of requests
      Namespace: Pulse/Chat
      MetricName: BedrockErrors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref PulseAlertsTopic
      OKActions:
        - !Ref PulseAlertsTopic
      TreatMissingData: notBreaching

  PulseChatDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'urgd-pulse-${Environment}-chat-duration'
      AlarmDescription: Chat message processing p99 duration exceeded 30 seconds
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Sub 'urgd-pulse-chat-${Environment}'
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 30000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref PulseAlertsTopic
      OKActions:
        - !Ref PulseAlertsTopic
      TreatMissingData: notBreaching

