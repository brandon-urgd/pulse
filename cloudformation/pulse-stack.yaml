  # ══════════════════════════════════════════════════════════════════════════════
  # S1: API Gateway Resources — /api/auth/register, /api/manage/settings, /api/manage/items
  # ══════════════════════════════════════════════════════════════════════════════

  # /api
  PulseApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !GetAtt PulseApiGateway.RootResourceId
      PathPart: api

  # /api/auth
  PulseAuthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseApiResource
      PathPart: auth

  # /api/auth/register
  PulseAuthRegisterResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseAuthResource
      PathPart: register

  PulseRegisterMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseAuthRegisterResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseRegisterFunction.Arn}/invocations'

  # /api/manage
  PulseManageResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseApiResource
      PathPart: manage

  # /api/manage/settings
  PulseManageSettingsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseManageResource
      PathPart: settings

  PulseGetSettingsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageSettingsResource
      HttpMethod: GET
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseGetSettingsFunction.Arn}/invocations'

  PulsePutSettingsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageSettingsResource
      HttpMethod: PUT
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
