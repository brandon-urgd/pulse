  PulseInviteReviewerFunctionRole:
    # checkov:skip=CKV_AWS_111:ses:SendEmail requires Resource:* — SES does not support resource-level ARNs for SendEmail
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'urgd-pulse-inviteReviewer-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsAndResources
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/urgd-pulse-*'
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt PulseSessionsTable.Arn
                  - !Sub '${PulseSessionsTable.Arn}/index/*'
                  - !GetAtt PulseItemsTable.Arn
                  - !GetAtt PulseTenantsTable.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub '${PulseDataBucket.Arn}/pulse/*'
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref PulseAlertsTopic
              - Effect: Allow
                Action:
                  - kms:GenerateDataKey*
                  - kms:Decrypt
                Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/alias/aws/sns'

