        Mode: Active
      Environment:
        Variables:
          ITEMS_TABLE: !Ref PulseItemsTable
          DATA_BUCKET: !Ref PulseDataBucket
          CORS_ALLOWED_ORIGINS: !Sub 'https://${FrontendDomainName}'
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseGetDocumentUrlFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PulseGetDocumentUrlFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PulseApiGateway}/*'

