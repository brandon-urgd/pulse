  GetDocumentUrlCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-getDocumentUrl/latest.zip
    Description: S3 key for urgd-pulse-getDocumentUrl Lambda ZIP

  GenerateReportCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-generateReport/latest.zip
    Description: S3 key for urgd-pulse-generateReport Lambda ZIP

  GetReportCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-getReport/latest.zip
    Description: S3 key for urgd-pulse-getReport Lambda ZIP

  RunPulseCheckCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-runPulseCheck/latest.zip
    Description: S3 key for urgd-pulse-runPulseCheck Lambda ZIP

  ProcessPulseCheckCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-processPulseCheck/latest.zip
    Description: S3 key for urgd-pulse-processPulseCheck Lambda ZIP

  GetPulseCheckCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-getPulseCheck/latest.zip
