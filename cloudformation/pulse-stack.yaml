  # S2: IAM Execution Roles
  # ══════════════════════════════════════════════════════════════════════════════

  PulseCreateItemFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'urgd-pulse-createItem-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsAndResources
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/urgd-pulse-*'
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource: !GetAtt PulseTenantsTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource: !GetAtt PulseItemsTable.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub '${PulseDataBucket.Arn}/pulse/*/items/*'

  PulseGetItemFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'urgd-pulse-getItem-role-${Environment}'
