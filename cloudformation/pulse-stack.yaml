  # S2: Lambda Functions
  # ══════════════════════════════════════════════════════════════════════════════

  PulseCreateItemFunction:
    Type: AWS::Lambda::Function
    DependsOn: PulseCreateItemLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-createItem-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt PulseCreateItemFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref CreateItemCodeKey
      Timeout: 30
      MemorySize: 512
      ReservedConcurrentExecutions: !FindInMap [Concurrency, !Ref Environment, CreateItem]
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ITEMS_TABLE: !Ref PulseItemsTable
          TENANTS_TABLE: !Ref PulseTenantsTable
          DATA_BUCKET_NAME: !Ref PulseDataBucket
          CORS_ALLOWED_ORIGINS: !Sub 'https://${FrontendDomainName}'
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseCreateItemFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PulseCreateItemFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
