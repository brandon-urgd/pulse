AWSTemplateFormatVersion: '2010-09-09'
Description: 'ur/gd Pulse — AI-guided feedback platform (S0 base resources)'

# ─── Parameters ───────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  ApiDomainName:
    Type: String
    Default: api.pulse.urgdstudios.com
    Description: Custom domain for API Gateway

  FrontendDomainName:
    Type: String
    Default: pulse.urgdstudios.com
    Description: Custom domain for CloudFront distribution

  AcmCertArnApiRegion:
    Type: String
    Default: arn:aws:acm:us-west-2:198919428218:certificate/a82eae05-299b-4aaf-afe7-3514717b6c72
    Description: ACM certificate ARN for *.pulse.urgdstudios.com (us-west-2, API Gateway)

  AcmCertArnCloudFront:
    Type: String
    Default: arn:aws:acm:us-east-1:198919428218:certificate/22185b8c-9f73-406a-971e-1c7fd4d523ec
    Description: ACM certificate ARN for pulse.urgdstudios.com (us-east-1, CloudFront)

  CognitoCallbackUrls:
    Type: CommaDelimitedList
    Description: Cognito OAuth callback URLs (comma-separated)

  CognitoLogoutUrls:
    Type: CommaDelimitedList
    Description: Cognito OAuth logout URLs (comma-separated)

  CognitoUserPoolDomainPrefix:
    Type: String
    Default: pulse-urgd
    Description: Cognito hosted UI domain prefix

  HealthCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-health/latest.zip
    Description: S3 key for urgd-pulse-health Lambda ZIP

  BedrockHealthCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-bedrockHealth/latest.zip
    Description: S3 key for urgd-pulse-bedrockHealth Lambda ZIP

  CognitoAuthCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-cognitoAuth/latest.zip
    Description: S3 key for urgd-pulse-cognitoAuth Lambda ZIP

  SessionAuthCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-sessionAuth/latest.zip
    Description: S3 key for urgd-pulse-sessionAuth Lambda ZIP

  RegisterCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-register/latest.zip
    Description: S3 key for urgd-pulse-register Lambda ZIP

  CreateTenantCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-createTenant/latest.zip
    Description: S3 key for urgd-pulse-createTenant Lambda ZIP

  GetSettingsCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-getSettings/latest.zip
