              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref PulseAlertsTopic
              - Effect: Allow
                Action:
                  - kms:GenerateDataKey*
                  - kms:Decrypt
                Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/alias/aws/sns'

  PulseProcessPulseCheckFunction:
    Type: AWS::Lambda::Function
    DependsOn: PulseProcessPulseCheckLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-processPulseCheck-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Timeout: 120
      MemorySize: 1024
      ReservedConcurrentExecutions: !FindInMap [Concurrency, !Ref Environment, ProcessPulseCheck]
      Role: !GetAtt PulseProcessPulseCheckFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref ProcessPulseCheckCodeKey
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          REPORTS_TABLE: !Ref PulseReportsTable
          PULSE_CHECKS_TABLE: !Ref PulsePulseChecksTable
          ITEMS_TABLE: !Ref PulseItemsTable
          BEDROCK_MODEL_ID: 'us.anthropic.claude-sonnet-4-6'
          ALERTS_TOPIC_ARN: !Ref PulseAlertsTopic
          AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
      Tags:
        - Key: project
          Value: pulse
        - Key: environment
          Value: !Ref Environment

  PulseGetPulseCheckFunction:
    Type: AWS::Lambda::Function
    DependsOn: PulseGetPulseCheckLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-getPulseCheck-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Timeout: 30
      MemorySize: 512
      ReservedConcurrentExecutions: !FindInMap [Concurrency, !Ref Environment, GetPulseCheck]
      Role: !GetAtt PulseGetPulseCheckFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref GetPulseCheckCodeKey
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          PULSE_CHECKS_TABLE: !Ref PulsePulseChecksTable
          CORS_ALLOWED_ORIGINS: !Sub 'https://${FrontendDomainName}'
          AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
      Tags:
        - Key: project
          Value: pulse
        - Key: environment
          Value: !Ref Environment

  PulseGetPulseCheckFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PulseGetPulseCheckFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PulseApiGateway}/*'

  PulseSavePCDecisionsFunction:
    Type: AWS::Lambda::Function
    DependsOn: PulseSavePCDecisionsLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-savePCDecisions-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Timeout: 30
      MemorySize: 512
      ReservedConcurrentExecutions: !FindInMap [Concurrency, !Ref Environment, SavePCDecisions]
      Role: !GetAtt PulseSavePCDecisionsFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref SavePCDecisionsCodeKey
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          PULSE_CHECKS_TABLE: !Ref PulsePulseChecksTable
          CORS_ALLOWED_ORIGINS: !Sub 'https://${FrontendDomainName}'
          AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
      Tags:
        - Key: project
          Value: pulse
        - Key: environment
          Value: !Ref Environment

  PulseSavePCDecisionsFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PulseSavePCDecisionsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PulseApiGateway}/*'

  PulseUsageReportFunction:
    Type: AWS::Lambda::Function
    DependsOn: PulseUsageReportLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-usageReport-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: !FindInMap [Concurrency, !Ref Environment, UsageReport]
      Role: !GetAtt PulseUsageReportFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref UsageReportCodeKey
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          TENANTS_TABLE: !Ref PulseTenantsTable
          SESSIONS_TABLE: !Ref PulseSessionsTable
          ALERTS_TOPIC_ARN: !Ref PulseAlertsTopic
          AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
      Tags:
        - Key: project
          Value: pulse
        - Key: environment
          Value: !Ref Environment

  PulseUsageReportFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PulseUsageReportFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PulseUsageReportRule.Arn

  # ══════════════════════════════════════════════════════════════════════════════
  # S5: EventBridge Rule — Daily Usage Report
  # ══════════════════════════════════════════════════════════════════════════════

  PulseUsageReportRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'urgd-pulse-${Environment}-usage-report'
      Description: Daily usage report — scans tenants and sessions, publishes CloudWatch metrics
      ScheduleExpression: 'cron(0 6 * * ? *)'
      State: ENABLED
      Targets:
        - Id: PulseUsageReportTarget
          Arn: !GetAtt PulseUsageReportFunction.Arn

  # ══════════════════════════════════════════════════════════════════════════════
  # S5: API Gateway Resources
  # ══════════════════════════════════════════════════════════════════════════════

  # GET /api/manage/items/{itemId}/sessions/{sessionId}/report
  PulseManageItemSessionReportResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseManageItemSessionResource
      PathPart: report

  PulseGetReportMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageItemSessionReportResource
      HttpMethod: GET
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseGetReportFunction.Arn}/invocations'

  # POST /api/manage/items/{itemId}/pulse-check
  PulseManageItemPulseCheckResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseManageItemResource
      PathPart: pulse-check

  PulseRunPulseCheckMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageItemPulseCheckResource
      HttpMethod: POST
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseRunPulseCheckFunction.Arn}/invocations'

  # GET /api/manage/items/{itemId}/pulse-check
  PulseGetPulseCheckMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageItemPulseCheckResource
      HttpMethod: GET
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseGetPulseCheckFunction.Arn}/invocations'

  # PUT /api/manage/items/{itemId}/pulse-check/decisions
  PulseManageItemPulseCheckDecisionsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseManageItemPulseCheckResource
      PathPart: decisions

  PulseSavePCDecisionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageItemPulseCheckDecisionsResource
      HttpMethod: PUT
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseSavePCDecisionsFunction.Arn}/invocations'

  # ══════════════════════════════════════════════════════════════════════════════
  # S6: Revision and Account Management — Parameters, Log Groups, IAM Roles,
  #     Lambda Functions, and API Gateway Resources
  # ══════════════════════════════════════════════════════════════════════════════

  # ── S6 CloudWatch Log Groups ─────────────────────────────────────────────────

  PulseGenerateRevisionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/urgd-pulse-generateRevision-${Environment}'
      RetentionInDays: !FindInMap [EnvConfig, !Ref Environment, LogRetentionDays]
      Tags:
        - Key: project
          Value: pulse
        - Key: environment
          Value: !Ref Environment

  PulseGetRevisionsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/urgd-pulse-getRevisions-${Environment}'
      RetentionInDays: !FindInMap [EnvConfig, !Ref Environment, LogRetentionDays]
      Tags:
        - Key: project
          Value: pulse
        - Key: environment
          Value: !Ref Environment

  PulseSendPulseCheckReadyLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/urgd-pulse-sendPulseCheckReady-${Environment}'
      RetentionInDays: !FindInMap [EnvConfig, !Ref Environment, LogRetentionDays]
      Tags:
        - Key: project
          Value: pulse
        - Key: environment
          Value: !Ref Environment

  # ── S6 IAM Execution Roles ───────────────────────────────────────────────────

  PulseGenerateRevisionFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'urgd-pulse-generateRevision-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GenerateRevisionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/urgd-pulse-*'
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt PulsePulseChecksTable.Arn
                  - !GetAtt PulseItemsTable.Arn
                  - !GetAtt PulseTenantsTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource: !GetAtt PulseItemsTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub '${PulseDataBucket.Arn}/pulse/*/items/*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub '${PulseDataBucket.Arn}/pulse/*/items/*/revisions/*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-sonnet-4-6'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - 'arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-sonnet-4-6'
                  - 'arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-sonnet-4-6'
                  - 'arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-sonnet-4-6'
                Condition:
                  StringEquals:
                    bedrock:InferenceProfileArn: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-sonnet-4-6'
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'

  PulseGetRevisionsFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'urgd-pulse-getRevisions-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GetRevisionsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/urgd-pulse-*'
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt PulseDataBucket.Arn
                Condition:
                  StringLike:
                    s3:prefix: 'pulse/*/items/*/revisions/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub '${PulseDataBucket.Arn}/pulse/*/items/*/revisions/*'

  PulseSendPulseCheckReadyFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'urgd-pulse-sendPulseCheckReady-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SendPulseCheckReadyPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/urgd-pulse-*'
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource: !GetAtt PulseTenantsTable.Arn
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/pulse@urgdstudios.com'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref PulseAlertsTopic
              - Effect: Allow
                Action:
                  - kms:GenerateDataKey*
                  - kms:Decrypt
                Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/alias/aws/sns'

  # ── S6 Lambda Functions ──────────────────────────────────────────────────────

  PulseGenerateRevisionFunction:
    Type: AWS::Lambda::Function
    DependsOn: PulseGenerateRevisionLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-generateRevision-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt PulseGenerateRevisionFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref GenerateRevisionCodeKey
      Timeout: 120
      MemorySize: 1024
      ReservedConcurrentExecutions: 25
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          PULSE_CHECKS_TABLE: !Ref PulsePulseChecksTable
          ITEMS_TABLE: !Ref PulseItemsTable
          TENANTS_TABLE: !Ref PulseTenantsTable
          DATA_BUCKET: !Ref PulseDataBucket
          BEDROCK_MODEL_ID: 'us.anthropic.claude-sonnet-4-6'
          CORS_ALLOWED_ORIGINS: !Sub 'https://${FrontendDomainName}'
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseGenerateRevisionFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PulseGenerateRevisionFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PulseApiGateway}/*'

  PulseGetRevisionsFunction:
    Type: AWS::Lambda::Function
    DependsOn: PulseGetRevisionsLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-getRevisions-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt PulseGetRevisionsFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref GetRevisionsCodeKey
      Timeout: 30
      MemorySize: 512
      ReservedConcurrentExecutions: 10
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          DATA_BUCKET: !Ref PulseDataBucket
          CORS_ALLOWED_ORIGINS: !Sub 'https://${FrontendDomainName}'
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseGetRevisionsFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PulseGetRevisionsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PulseApiGateway}/*'

  PulseSendPulseCheckReadyFunction:
    Type: AWS::Lambda::Function
    DependsOn: PulseSendPulseCheckReadyLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-sendPulseCheckReady-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt PulseSendPulseCheckReadyFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref SendPulseCheckReadyCodeKey
      Timeout: 30
      MemorySize: 512
      ReservedConcurrentExecutions: 5
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          TENANTS_TABLE: !Ref PulseTenantsTable
          ALERTS_TOPIC_ARN: !Ref PulseAlertsTopic
          APP_URL: !Sub 'https://${FrontendDomainName}'
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  # ── S6 API Gateway Resources and Methods ─────────────────────────────────────

  # POST /api/manage/items/{itemId}/revise
  PulseManageItemReviseResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseManageItemResource
      PathPart: revise

  PulseGenerateRevisionMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageItemReviseResource
      HttpMethod: POST
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseGenerateRevisionFunction.Arn}/invocations'

  # GET /api/manage/items/{itemId}/revisions
  PulseManageItemRevisionsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseManageItemResource
      PathPart: revisions

  PulseGetRevisionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageItemRevisionsResource
      HttpMethod: GET
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseGetRevisionsFunction.Arn}/invocations'

  # ── Update expireSessions function to add new env vars for auto-trigger ───────
  # (The expireSessions function is defined in S3 — we update its env vars here
  #  by referencing the new functions. The actual function resource is updated
  #  in-place via CloudFormation update.)


Outputs:
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref PulseCloudFrontDistribution
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-cf-distribution-id'

  ApiGatewayId:
    Description: API Gateway REST API ID
    Value: !Ref PulseApiGateway
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-api-id'

  S3BucketName:
    Description: S3 data bucket name
    Value: !Ref PulseDataBucket
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-data-bucket'

  FrontendBucketName:
    Description: S3 frontend bucket name
    Value: !Ref PulseFrontendBucket
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-frontend-bucket'

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref PulseUserPool
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-user-pool-id'

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref PulseUserPoolClient
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-user-pool-client-id'

  ApiBaseUrl:
    Description: API Gateway base URL (custom domain)
    Value: !Sub 'https://${ApiDomainName}'
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-api-base-url'

  CognitoDomain:
    Description: Cognito hosted UI domain
    Value: !Sub 'https://${CognitoUserPoolDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-cognito-domain'

  ShieldCallbackLambdaArn:
    Description: ARN of the Shield callback Lambda — used by CI/CD to register with Shield
    Value: !GetAtt PulseShieldCallbackFunction.Arn
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-shield-callback-arn'

