AWSTemplateFormatVersion: '2010-09-09'
Description: 'ur/gd Pulse — AI-guided feedback platform (S0 base resources)'

# ─── Parameters ───────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  ApiDomainName:
    Type: String
    Default: api.pulse.urgdstudios.com
    Description: Custom domain for API Gateway

  FrontendDomainName:
    Type: String
    Default: pulse.urgdstudios.com
    Description: Custom domain for CloudFront distribution

  AcmCertArnApiRegion:
    Type: String
    Default: arn:aws:acm:us-west-2:198919428218:certificate/a82eae05-299b-4aaf-afe7-3514717b6c72
    Description: ACM certificate ARN for *.pulse.urgdstudios.com (us-west-2, API Gateway)

  AcmCertArnCloudFront:
    Type: String
    Default: arn:aws:acm:us-east-1:198919428218:certificate/22185b8c-9f73-406a-971e-1c7fd4d523ec
    Description: ACM certificate ARN for pulse.urgdstudios.com (us-east-1, CloudFront)

  CognitoCallbackUrls:
    Type: CommaDelimitedList
    Description: Cognito OAuth callback URLs (comma-separated)

  CognitoLogoutUrls:
    Type: CommaDelimitedList
    Description: Cognito OAuth logout URLs (comma-separated)

  CognitoUserPoolDomainPrefix:
    Type: String
    Default: pulse-urgd
    Description: Cognito hosted UI domain prefix

  HealthCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-health/latest.zip
    Description: S3 key for urgd-pulse-health Lambda ZIP

  BedrockHealthCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-bedrockHealth/latest.zip
    Description: S3 key for urgd-pulse-bedrockHealth Lambda ZIP

  CognitoAuthCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-cognitoAuth/latest.zip
    Description: S3 key for urgd-pulse-cognitoAuth Lambda ZIP

  SessionAuthCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-sessionAuth/latest.zip
    Description: S3 key for urgd-pulse-sessionAuth Lambda ZIP

  RegisterCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-register/latest.zip
    Description: S3 key for urgd-pulse-register Lambda ZIP

  CreateTenantCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-createTenant/latest.zip
    Description: S3 key for urgd-pulse-createTenant Lambda ZIP

  GetSettingsCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-getSettings/latest.zip
    Description: S3 key for urgd-pulse-getSettings Lambda ZIP

  UpdateSettingsCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-updateSettings/latest.zip
    Description: S3 key for urgd-pulse-updateSettings Lambda ZIP

  GetItemsCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-getItems/latest.zip
    Description: S3 key for urgd-pulse-getItems Lambda ZIP

  CreateItemCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-createItem/latest.zip
    Description: S3 key for urgd-pulse-createItem Lambda ZIP

  GetItemCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-getItem/latest.zip
    Description: S3 key for urgd-pulse-getItem Lambda ZIP

  UpdateItemCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-updateItem/latest.zip
    Description: S3 key for urgd-pulse-updateItem Lambda ZIP

  DeleteItemCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-deleteItem/latest.zip
    Description: S3 key for urgd-pulse-deleteItem Lambda ZIP

  GetUploadUrlCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-getUploadUrl/latest.zip
    Description: S3 key for urgd-pulse-getUploadUrl Lambda ZIP

  ShieldCallbackCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-shieldCallback/latest.zip
    Description: S3 key for urgd-pulse-shieldCallback Lambda ZIP

  ExtractTextCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-extractText/latest.zip
    Description: S3 key for urgd-pulse-extractText Lambda ZIP

  QuarantineBucketName:
    Type: String
    Default: ''
    Description: Shield quarantine bucket name (from Shield stack SSM parameter /urgd/shield/quarantine_bucket_name)

  ShieldEventBridgeRuleArn:
    Type: String
    Description: Shield EventBridge rule ARN (from SSM parameter /urgd/shield/eventbridge_rule_arn)

  PublicSignup:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Whether public self-registration is enabled

  AppleClientId:
    Type: String
    Default: ''
    Description: Apple Sign In client ID (bundle ID) — leave empty to skip Apple IdP

  AppleTeamId:
    Type: String
    Default: ''
    Description: Apple developer team ID — leave empty to skip Apple IdP

  AppleKeyId:
    Type: String
    Default: ''
    Description: Apple Sign In key ID — leave empty to skip Apple IdP

  ApplePrivateKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: Apple Sign In private key (PEM) — leave empty to skip Apple IdP

  GoogleClientId:
    Type: String
    Default: ''
    Description: Google OAuth client ID — leave empty to skip Google IdP

  GoogleClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Google OAuth client secret — leave empty to skip Google IdP

  UrgdStudiosHostedZoneId:
    Type: String
    Default: Z0338626TGE7PTZDLIT1
    Description: Route53 hosted zone ID for urgdstudios.com

  MonitoringEmail:
    Type: String
    Default: alerts@urgd.dev
    Description: Email for P0 alert notifications

  CriticalAlertsEmail:
    Type: String
    Default: critical@urgd.dev
    Description: Email for critical alert notifications

# ─── Conditions ───────────────────────────────────────────────────────────────
Conditions:
  IsProduction: !Equals [!Ref Environment, prod]

# ─── Mappings ─────────────────────────────────────────────────────────────────
Mappings:
  EnvConfig:
    dev:
      LogRetentionDays: 7
    staging:
      LogRetentionDays: 14
    prod:
      LogRetentionDays: 30

  # ReservedConcurrentExecutions per function per environment
  # dev: 3 flat, staging: 5 flat, prod: tiered
  Concurrency:
    dev:
      Health: 3
      BedrockHealth: 3
      CognitoAuth: 3
      SessionAuth: 3
      Register: 3
      CreateTenant: 3
      GetSettings: 3
      UpdateSettings: 3
      GetItems: 3
      CreateItem: 3
      GetItem: 3
      UpdateItem: 3
      DeleteItem: 3
      GetUploadUrl: 3
      ShieldCallback: 3
      ExtractText: 3
    staging:
      Health: 5
      BedrockHealth: 5
      CognitoAuth: 5
      SessionAuth: 5
      Register: 5
      CreateTenant: 5
      GetSettings: 5
      UpdateSettings: 5
      GetItems: 5
      CreateItem: 5
      GetItem: 5
      UpdateItem: 5
      DeleteItem: 5
      GetUploadUrl: 5
      ShieldCallback: 5
      ExtractText: 5
    prod:
      Health: 5
      BedrockHealth: 5
      CognitoAuth: 25
      SessionAuth: 15
      Register: 5
      CreateTenant: 5
      GetSettings: 10
      UpdateSettings: 10
      GetItems: 10
      CreateItem: 10
      GetItem: 10
      UpdateItem: 10
      DeleteItem: 10
      GetUploadUrl: 10
      ShieldCallback: 5
      ExtractText: 5

# ─── Resources ────────────────────────────────────────────────────────────────
Resources:

  # ══════════════════════════════════════════════════════════════════════════════
  # DynamoDB Tables (S0)
  # ══════════════════════════════════════════════════════════════════════════════

  PulseTenantsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      TableName: !Sub 'urgd-pulse-tenants-${Environment}'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseItemsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      TableName: !Sub 'urgd-pulse-items-${Environment}'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
        - AttributeName: itemId
          AttributeType: S
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH
        - AttributeName: itemId
          KeyType: RANGE
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseSessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      TableName: !Sub 'urgd-pulse-sessions-${Environment}'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: itemId
          AttributeType: S
        - AttributeName: pulseCode
          AttributeType: S
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH
        - AttributeName: sessionId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: item-index
          KeySchema:
            - AttributeName: itemId
              KeyType: HASH
            - AttributeName: sessionId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: pulseCode-index
          KeySchema:
            - AttributeName: pulseCode
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseTranscriptsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      TableName: !Sub 'urgd-pulse-transcripts-${Environment}'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: messageId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
        - AttributeName: messageId
          KeyType: RANGE
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseReportsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      TableName: !Sub 'urgd-pulse-reports-${Environment}'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: itemId
          AttributeType: S
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH
        - AttributeName: sessionId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: item-index
          KeySchema:
            - AttributeName: itemId
              KeyType: HASH
            - AttributeName: sessionId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulsePulseChecksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      TableName: !Sub 'urgd-pulse-pulsechecks-${Environment}'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
        - AttributeName: itemId
          AttributeType: S
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH
        - AttributeName: itemId
          KeyType: RANGE
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  # ══════════════════════════════════════════════════════════════════════════════
  # S3 Buckets (S0)
  # ══════════════════════════════════════════════════════════════════════════════

  PulseDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      BucketName: !Sub 'urgd-pulse-data-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseFrontendBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      BucketName: !Sub 'urgd-pulse-frontend-${Environment}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PulseFrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${PulseFrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${PulseCloudFrontDistribution}'


  # ══════════════════════════════════════════════════════════════════════════════
  # Cognito (S0)
  # ══════════════════════════════════════════════════════════════════════════════

  PulseUserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: !If [IsProduction, Retain, Delete]
    Properties:
      UserPoolName: !Sub 'urgd-pulse-userpool-${Environment}'
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      EmailConfiguration:
        EmailSendingAccount: DEVELOPER
        From: 'Pulse <pulse@urgdstudios.com>'
        ReplyToEmailAddress: no-reply@urgdstudios.com
        SourceArn: !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/urgdstudios.com'
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolTags:
        project: pulse
        brand: urgd
        studio: urgd-studios
        environment: !Ref Environment
        cfn-stack-name: !Ref AWS::StackName
        license: proprietary

  PulseAppleIdProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref PulseUserPool
      ProviderName: SignInWithApple
      ProviderType: SignInWithApple
      ProviderDetails:
        client_id: !Ref AppleClientId
        team_id: !Ref AppleTeamId
        key_id: !Ref AppleKeyId
        private_key: !Ref ApplePrivateKey
        authorize_scopes: 'name email'
      AttributeMapping:
        email: email
        name: name

  PulseGoogleIdProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref PulseUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: 'profile email openid'
      AttributeMapping:
        email: email
        name: name

  PulseUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn:
      - PulseAppleIdProvider
      - PulseGoogleIdProvider
    Properties:
      ClientName: !Sub 'urgd-pulse-client-${Environment}'
      UserPoolId: !Ref PulseUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO
        - SignInWithApple
        - Google
      CallbackURLs: !Ref CognitoCallbackUrls
      LogoutURLs: !Ref CognitoLogoutUrls
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true

  PulseUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoUserPoolDomainPrefix
      UserPoolId: !Ref PulseUserPool

  # ══════════════════════════════════════════════════════════════════════════════
  # API Gateway (S0)
  # ══════════════════════════════════════════════════════════════════════════════

  PulseApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'urgd-pulse-api-${Environment}'
      Description: Pulse REST API
      EndpointConfiguration:
        Types: [REGIONAL]
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PulseHealthMethod
      - PulseBedrockHealthMethod
      - PulseOptionsMethod
      - PulseRegisterMethod
      - PulseGetSettingsMethod
      - PulsePutSettingsMethod
      - PulseGetItemsMethod
      - PulsePostItemsMethod
      - PulseGetItemMethod
      - PulsePutItemMethod
      - PulseDeleteItemMethod
      - PulsePostUploadUrlMethod
    Properties:
      RestApiId: !Ref PulseApiGateway

  PulseApiGatewayAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/urgd-pulse-${Environment}'
      RetentionInDays: !FindInMap [EnvConfig, !Ref Environment, LogRetentionDays]

  PulseApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref PulseApiGateway
      DeploymentId: !Ref PulseApiGatewayDeployment
      StageName: !Ref Environment
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt PulseApiGatewayAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","integrationLatency":"$context.integrationLatency"}'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: false

  PulseApiDomainName:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref ApiDomainName
      RegionalCertificateArn: !Ref AcmCertArnApiRegion
      EndpointConfiguration:
        Types: [REGIONAL]
      SecurityPolicy: TLS_1_2

  PulseApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn: PulseApiGatewayStage
    Properties:
      DomainName: !Ref PulseApiDomainName
      RestApiId: !Ref PulseApiGateway
      Stage: !Ref Environment

  PulseApiDNS:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref UrgdStudiosHostedZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt PulseApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt PulseApiDomainName.RegionalHostedZoneId

  PulseCloudFrontDNS:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref UrgdStudiosHostedZoneId
      Name: !Ref FrontendDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt PulseCloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  PulseCognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: urgd-pulse-cognitoAuth
      RestApiId: !Ref PulseApiGateway
      Type: TOKEN
      AuthorizerUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseCognitoAuthFunction.Arn}/invocations'
      AuthorizerResultTtlInSeconds: 300
      IdentitySource: method.request.header.Authorization

  PulseSessionAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: urgd-pulse-sessionAuth
      RestApiId: !Ref PulseApiGateway
      Type: TOKEN
      AuthorizerUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseSessionAuthFunction.Arn}/invocations'
      AuthorizerResultTtlInSeconds: 0
      IdentitySource: method.request.header.Authorization

  # ── API Gateway Resources and Methods (minimal S0 skeleton) ──────────────────

  # /v1
  PulseV1Resource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !GetAtt PulseApiGateway.RootResourceId
      PathPart: v1

  # /v1/health
  PulseHealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseV1Resource
      PathPart: health

  PulseHealthMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseHealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseHealthFunction.Arn}/invocations'

  # /v1/bedrock
  PulseBedrockResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseV1Resource
      PathPart: bedrock

  # /v1/bedrock/health
  PulseBedrockHealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseBedrockResource
      PathPart: health

  PulseBedrockHealthMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseBedrockHealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseBedrockHealthFunction.Arn}/invocations'

  # OPTIONS /* (CORS mock integration — root level proxy)
  PulseProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !GetAtt PulseApiGateway.RootResourceId
      PathPart: '{proxy+}'

  PulseOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseProxyResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 204}'
        IntegrationResponses:
          - StatusCode: '204'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: '204'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true


  # ══════════════════════════════════════════════════════════════════════════════
  # CloudFront (S0)
  # ══════════════════════════════════════════════════════════════════════════════

  PulseCloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'urgd-pulse-oac-${Environment}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  PulseSpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub 'urgd-pulse-spa-rewrite-${Environment}'
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrites extensionless paths under /admin/* and /s/* to their index.html
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if ((uri.startsWith('/admin/') || uri.startsWith('/s/')) && !uri.includes('.')) {
            if (uri.startsWith('/admin/')) {
              request.uri = '/admin/index.html';
            } else {
              request.uri = '/s/index.html';
            }
          }
          return request;
        }

  PulseResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub 'urgd-pulse-security-headers-${Environment}'
        Comment: Security headers for Pulse CloudFront distribution
        SecurityHeadersConfig:
          FrameOptions:
            FrameOption: DENY
            Override: true
          ContentTypeOptions:
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentSecurityPolicy:
            ContentSecurityPolicy: !Sub "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://${ApiDomainName} https://cognito-idp.${AWS::Region}.amazonaws.com https://*.amazoncognito.com https://*.s3.${AWS::Region}.amazonaws.com; frame-ancestors 'none';"
            Override: true

  PulseCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'urgd-pulse-${Environment}'
        Aliases:
          - !Ref FrontendDomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertArnCloudFront
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        HttpVersion: http2
        DefaultRootObject: index.html
        Origins:
          - Id: S3FrontendOrigin
            DomainName: !GetAtt PulseFrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref PulseCloudFrontOAC
          - Id: ApiGatewayOrigin
            DomainName: !Ref ApiDomainName
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        CacheBehaviors:
          # /api/* — API Gateway, no cache, all methods
          - PathPattern: '/api/*'
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
            ResponseHeadersPolicyId: !Ref PulseResponseHeadersPolicy
          # /admin/* — S3, SPA rewrite, standard cache
          - PathPattern: '/admin/*'
            TargetOriginId: S3FrontendOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt PulseSpaRewriteFunction.FunctionARN
            ResponseHeadersPolicyId: !Ref PulseResponseHeadersPolicy
          # /s/* — S3, SPA rewrite, standard cache
          - PathPattern: '/s/*'
            TargetOriginId: S3FrontendOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt PulseSpaRewriteFunction.FunctionARN
            ResponseHeadersPolicyId: !Ref PulseResponseHeadersPolicy
          # /assets/* — S3, long TTL (hashed filenames)
          - PathPattern: '/assets/*'
            TargetOriginId: S3FrontendOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            ResponseHeadersPolicyId: !Ref PulseResponseHeadersPolicy
        # Default /* — S3, landing page, no rewrite
        DefaultCacheBehavior:
          TargetOriginId: S3FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          ResponseHeadersPolicyId: !Ref PulseResponseHeadersPolicy
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary


  # ══════════════════════════════════════════════════════════════════════════════
  # Observability (S0)
  # ══════════════════════════════════════════════════════════════════════════════

  PulseAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'urgd-pulse-alerts-${Environment}'
      KmsMasterKeyId: alias/aws/sns
      Subscription:
        - Protocol: email
          Endpoint: !Ref MonitoringEmail
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
          Value: urgd
        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseCriticalTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'urgd-pulse-critical-${Environment}'
      KmsMasterKeyId: alias/aws/sns
      Subscription:
        - Protocol: email
          Endpoint: !Ref CriticalAlertsEmail
      Tags:
        - Key: project
          Value: pulse
        - Key: brand
