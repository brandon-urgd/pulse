  # ══════════════════════════════════════════════════════════════════════════════
  # S5: Lambda Functions
  # ══════════════════════════════════════════════════════════════════════════════

  PulseGenerateReportFunction:
    Type: AWS::Lambda::Function
    DependsOn: PulseGenerateReportLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-generateReport-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Timeout: 120
      MemorySize: 1024
      ReservedConcurrentExecutions: !FindInMap [Concurrency, !Ref Environment, GenerateReport]
      Role: !GetAtt PulseGenerateReportFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref GenerateReportCodeKey
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          TRANSCRIPTS_TABLE: !Ref PulseTranscriptsTable
          REPORTS_TABLE: !Ref PulseReportsTable
          SESSIONS_TABLE: !Ref PulseSessionsTable
          BEDROCK_MODEL_ID: 'us.anthropic.claude-sonnet-4-6'
          AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
      Tags:
        - Key: project
          Value: pulse
        - Key: environment
          Value: !Ref Environment

  PulseGetReportFunction:
    Type: AWS::Lambda::Function
    DependsOn: PulseGetReportLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-getReport-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Timeout: 30
      MemorySize: 512
      ReservedConcurrentExecutions: !FindInMap [Concurrency, !Ref Environment, GetReport]
      Role: !GetAtt PulseGetReportFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref GetReportCodeKey
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          REPORTS_TABLE: !Ref PulseReportsTable
          SESSIONS_TABLE: !Ref PulseSessionsTable
          CORS_ALLOWED_ORIGINS: !Sub 'https://${FrontendDomainName}'
          AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
      Tags:
        - Key: project
          Value: pulse
        - Key: environment
          Value: !Ref Environment

  PulseGetReportFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PulseGetReportFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PulseApiGateway}/*'

  PulseRunPulseCheckFunction:
