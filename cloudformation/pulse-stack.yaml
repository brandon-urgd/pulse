  CreateItemCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-createItem/latest.zip
    Description: S3 key for urgd-pulse-createItem Lambda ZIP

  GetItemCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-getItem/latest.zip
    Description: S3 key for urgd-pulse-getItem Lambda ZIP

  UpdateItemCodeKey:
    Type: String
    Default: lambda-packages/urgd-pulse-updateItem/latest.zip
    Description: S3 key for urgd-pulse-updateItem Lambda ZIP

  DeleteItemCodeKey:
    Type: String
