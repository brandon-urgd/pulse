  # ══════════════════════════════════════════════════════════════════════════════

  PulseHealthFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'urgd-pulse-health-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/urgd-pulse-*'
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'

  PulseBedrockHealthFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'urgd-pulse-bedrockHealth-role-${Environment}'
