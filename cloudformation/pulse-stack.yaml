  # EventBridge scheduled rules

  PulseSendReminderRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'urgd-pulse-sendReminder-${Environment}'
      Description: Triggers sendReminder Lambda hourly to send deadline reminder emails
      ScheduleExpression: rate(1 hour)
      State: ENABLED
      Targets:
        - Id: PulseSendReminderTarget
          Arn: !GetAtt PulseSendReminderFunction.Arn

  PulseExpireSessionsRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'urgd-pulse-expireSessions-${Environment}'
      Description: Triggers expireSessions Lambda every 6 hours to mark past-due sessions as expired
      ScheduleExpression: rate(6 hours)
      State: ENABLED
      Targets:
        - Id: PulseExpireSessionsTarget
          Arn: !GetAtt PulseExpireSessionsFunction.Arn

  PulseSendReminderPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PulseSendReminderFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PulseSendReminderRule.Arn

  PulseExpireSessionsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PulseExpireSessionsFunction
      Action: lambda:InvokeFunction
