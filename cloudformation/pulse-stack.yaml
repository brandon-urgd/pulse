  # ══════════════════════════════════════════════════════════════════════════════
  # S3: Scheduled Job Resources (sendReminder + expireSessions)
  # ══════════════════════════════════════════════════════════════════════════════

  PulseSendReminderLogGroup:
    # checkov:skip=CKV_AWS_158:KMS encryption not required for Lambda execution logs — consistent with all other Pulse log groups
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/urgd-pulse-sendReminder-${Environment}'
      RetentionInDays: !FindInMap [EnvConfig, !Ref Environment, LogRetentionDays]
      Tags:
        - Key: project
          Value: pulse
        - Key: environment
          Value: !Ref Environment

  PulseExpireSessionsLogGroup:
    # checkov:skip=CKV_AWS_158:KMS encryption not required for Lambda execution logs — consistent with all other Pulse log groups
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/urgd-pulse-expireSessions-${Environment}'
      RetentionInDays: !FindInMap [EnvConfig, !Ref Environment, LogRetentionDays]
      Tags:
        - Key: project
          Value: pulse
        - Key: environment
          Value: !Ref Environment

  PulseSendReminderFunctionRole:
    # checkov:skip=CKV_AWS_111:ses:SendEmail requires Resource:* — SES does not support resource-level ARNs for SendEmail
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'urgd-pulse-sendReminder-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsAndResources
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/urgd-pulse-*'
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                Resource: !GetAtt PulseSessionsTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt PulseItemsTable.Arn
                  - !GetAtt PulseTenantsTable.Arn
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref PulseAlertsTopic
              - Effect: Allow
                Action:
                  - kms:GenerateDataKey*
                  - kms:Decrypt
                Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/alias/aws/sns'

  PulseExpireSessionsFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'urgd-pulse-expireSessions-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsAndDynamoDB
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/urgd-pulse-*'
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource: !GetAtt PulseSessionsTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !GetAtt PulseTranscriptsTable.Arn
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt PulseGenerateReportFunction.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource: !GetAtt PulseItemsTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !Sub '${PulseSessionsTable.Arn}/index/*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt PulseRunPulseCheckFunction.Arn
                  - !GetAtt PulseSendPulseCheckReadyFunction.Arn

  PulseSendReminderFunction:
    # checkov:skip=CKV_AWS_117:Lambda VPC not required — scheduled job accesses DynamoDB/SES/SNS via AWS service endpoints
    # checkov:skip=CKV_AWS_116:EventBridge-triggered Lambda — DLQ not applicable; failures logged and alerted via SNS
    # checkov:skip=CKV_AWS_173:Environment variables contain no sensitive data — table names and topic ARNs only
    Type: AWS::Lambda::Function
    DependsOn: PulseSendReminderLogGroup
    Properties:
      FunctionName: !Sub 'urgd-pulse-sendReminder-${Environment}'
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt PulseSendReminderFunctionRole.Arn
      Code:
        S3Bucket: urgd-applicationdata
        S3Key: !Ref SendReminderCodeKey
      Timeout: 300
      MemorySize: 512
      ReservedConcurrentExecutions: !FindInMap [Concurrency, !Ref Environment, SendReminder]
