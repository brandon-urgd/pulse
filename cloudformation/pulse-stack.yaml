        - Key: studio
          Value: urgd-studios
        - Key: environment
          Value: !Ref Environment
        - Key: cfn-stack-name
          Value: !Ref AWS::StackName
        - Key: license
          Value: proprietary

  PulseApi5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'urgd-pulse-${Environment}-api-5xx'
      AlarmDescription: API Gateway 5xx error rate exceeded threshold
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub 'urgd-pulse-api-${Environment}'
        - Name: Stage
          Value: !Ref Environment
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref PulseAlertsTopic
      OKActions:
        - !Ref PulseAlertsTopic
      TreatMissingData: notBreaching

  PulseLambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'urgd-pulse-${Environment}-lambda-errors'
      AlarmDescription: Lambda error rate exceeded threshold
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Sub 'urgd-pulse-health-${Environment}'
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref PulseAlertsTopic
      OKActions:
        - !Ref PulseAlertsTopic
      TreatMissingData: notBreaching

