      SourceArn: !Ref ShieldEventBridgeRuleArn

  # ══════════════════════════════════════════════════════════════════════════════
  # S2: API Gateway Resources — item CRUD + upload URL
  # ══════════════════════════════════════════════════════════════════════════════

  # POST /api/manage/items
  PulsePostItemsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageItemsResource
      HttpMethod: POST
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseCreateItemFunction.Arn}/invocations'

  # /api/manage/items/{itemId}
  PulseManageItemResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseManageItemsResource
      PathPart: '{itemId}'

  PulseGetItemMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageItemResource
      HttpMethod: GET
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseGetItemFunction.Arn}/invocations'

  PulsePutItemMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageItemResource
      HttpMethod: PUT
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseUpdateItemFunction.Arn}/invocations'

  PulseDeleteItemMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageItemResource
      HttpMethod: DELETE
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseDeleteItemFunction.Arn}/invocations'

  # /api/manage/items/{itemId}/upload-url
  PulseManageItemUploadUrlResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PulseApiGateway
      ParentId: !Ref PulseManageItemResource
      PathPart: upload-url

  PulsePostUploadUrlMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PulseApiGateway
      ResourceId: !Ref PulseManageItemUploadUrlResource
      HttpMethod: POST
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref PulseCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PulseGetUploadUrlFunction.Arn}/invocations'


# ─── Outputs ──────────────────────────────────────────────────────────────────
Outputs:
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref PulseCloudFrontDistribution
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-cf-distribution-id'

  ApiGatewayId:
    Description: API Gateway REST API ID
    Value: !Ref PulseApiGateway
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-api-id'

  S3BucketName:
    Description: S3 data bucket name
    Value: !Ref PulseDataBucket
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-data-bucket'

  FrontendBucketName:
    Description: S3 frontend bucket name
    Value: !Ref PulseFrontendBucket
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-frontend-bucket'

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref PulseUserPool
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-user-pool-id'

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref PulseUserPoolClient
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-user-pool-client-id'

  ApiBaseUrl:
    Description: API Gateway base URL (custom domain)
    Value: !Sub 'https://${ApiDomainName}'
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-api-base-url'

  CognitoDomain:
    Description: Cognito hosted UI domain
    Value: !Sub 'https://${CognitoUserPoolDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-cognito-domain'

  ShieldCallbackLambdaArn:
    Description: ARN of the Shield callback Lambda — used by CI/CD to register with Shield
    Value: !GetAtt PulseShieldCallbackFunction.Arn
    Export:
      Name: !Sub 'urgd-pulse-${Environment}-shield-callback-arn'

