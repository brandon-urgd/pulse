name: Deploy Pulse

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm_prod:
        description: "For PROD only: type DEPLOY to confirm"
        required: false
        type: string

env:
  APP_NAME: pulse
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ARTIFACT_BUCKET: urgd-applicationdata
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── 1. Version ───────────────────────────────────────────────────────────────
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '\n\r')
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION"

  # ── 2. Security scan ─────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install security tools
        run: pip install --quiet cfn-lint checkov semgrep

      - name: cfn-lint
        run: |
          set -euo pipefail
          cfn-lint cloudformation/pulse-stack.yaml --ignore-checks W3045
          echo "✅ cfn-lint passed"

      - name: Checkov
        run: |
          set -euo pipefail
          checkov \
            --file cloudformation/pulse-stack.yaml \
            --framework cloudformation \
            --config-file .checkov.yml \
            --compact \
            --quiet
          echo "✅ Checkov passed"

      - name: Semgrep
        run: |
          set -euo pipefail
          # .semgrepignore at repo root is auto-discovered
          # nosemgrep inline comments suppress false positives in test files
          semgrep \
            --config=auto \
            --severity=ERROR \
            --error \
            --quiet \
            lambdas/ apps/ scripts/
          echo "✅ Semgrep passed"

  # ── 3. Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [version, security-scan]
    permissions:
      id-token: write
      contents: read
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/urgd-pulse-deploy
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Lambda ZIPs
        run: |
          set -euo pipefail
          chmod +x scripts/build-lambdas.sh
          ./scripts/build-lambdas.sh "$VERSION"

      - name: Fetch secrets from SSM
        run: |
          set -euo pipefail

          GOOGLE_CLIENT_ID=$(aws ssm get-parameter \
            --name "/pulse/google/client-id" \
            --query 'Parameter.Value' \
            --output text \
            --region ${{ env.AWS_REGION }})

          GOOGLE_CLIENT_SECRET=$(aws ssm get-parameter \
            --name "/pulse/google/client-secret" \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text \
            --region ${{ env.AWS_REGION }})

          APPLE_TEAM_ID=$(aws ssm get-parameter \
            --name "/pulse/apple/team-id" \
            --query 'Parameter.Value' \
            --output text \
            --region ${{ env.AWS_REGION }})

          APPLE_KEY_ID=$(aws ssm get-parameter \
            --name "/pulse/apple/key-id" \
            --query 'Parameter.Value' \
            --output text \
            --region ${{ env.AWS_REGION }})

          APPLE_CLIENT_ID=$(aws ssm get-parameter \
            --name "/pulse/apple/client-id" \
            --query 'Parameter.Value' \
            --output text \
            --region ${{ env.AWS_REGION }})

          APPLE_PRIVATE_KEY=$(aws ssm get-parameter \
            --name "/pulse/apple/private-key" \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text \
            --region ${{ env.AWS_REGION }})

          echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> $GITHUB_ENV
          echo "::add-mask::$GOOGLE_CLIENT_SECRET"
          echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> $GITHUB_ENV
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> $GITHUB_ENV
          echo "APPLE_KEY_ID=$APPLE_KEY_ID" >> $GITHUB_ENV
          echo "APPLE_CLIENT_ID=$APPLE_CLIENT_ID" >> $GITHUB_ENV
          echo "::add-mask::$APPLE_PRIVATE_KEY"
          echo "APPLE_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          echo "$APPLE_PRIVATE_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "✅ Secrets fetched from SSM"

      - name: Generate parameter files
        run: |
          set -euo pipefail

          # Download the manifest written by build-lambdas.sh
          aws s3 cp \
            "s3://${{ env.ARTIFACT_BUCKET }}/lambda-packages/manifest-${VERSION}.json" \
            /tmp/lambda-manifest.json \
            --region ${{ env.AWS_REGION }}

          echo "📋 Lambda manifest:"
          cat /tmp/lambda-manifest.json

          mkdir -p parameter-files

          for env in dev staging prod; do
            case "$env" in
              dev)
                API_DOMAIN="api-dev.pulse.urgdstudios.com"
                FRONTEND_DOMAIN="dev.pulse.urgdstudios.com"
                COGNITO_CALLBACKS="https://dev.pulse.urgdstudios.com/admin/login,http://localhost:5173/admin/login"
                COGNITO_LOGOUTS="https://dev.pulse.urgdstudios.com/admin/login,http://localhost:5173/admin/login"
                COGNITO_DOMAIN_PREFIX="pulse-urgd-dev"
                ;;
              staging)
                API_DOMAIN="api-staging.pulse.urgdstudios.com"
                FRONTEND_DOMAIN="staging.pulse.urgdstudios.com"
                COGNITO_CALLBACKS="https://staging.pulse.urgdstudios.com/admin/login"
                COGNITO_LOGOUTS="https://staging.pulse.urgdstudios.com/admin/login"
                COGNITO_DOMAIN_PREFIX="pulse-urgd-staging"
                ;;
              prod)
                API_DOMAIN="api.pulse.urgdstudios.com"
                FRONTEND_DOMAIN="pulse.urgdstudios.com"
                COGNITO_CALLBACKS="https://pulse.urgdstudios.com/admin/login"
                COGNITO_LOGOUTS="https://pulse.urgdstudios.com/admin/login"
                COGNITO_DOMAIN_PREFIX="pulse-urgd"
                ;;
            esac

            # Build static params, then append one CodeKey entry per Lambda from manifest
            python3 - <<PYEOF
          import json, re, os

          with open('/tmp/lambda-manifest.json') as f:
              manifest = json.load(f)

          static_params = [
              {"ParameterKey": "Environment",                "ParameterValue": "$env"},
              {"ParameterKey": "ApiDomainName",              "ParameterValue": "$API_DOMAIN"},
              {"ParameterKey": "FrontendDomainName",         "ParameterValue": "$FRONTEND_DOMAIN"},
              {"ParameterKey": "CognitoCallbackUrls",        "ParameterValue": "$COGNITO_CALLBACKS"},
              {"ParameterKey": "CognitoLogoutUrls",          "ParameterValue": "$COGNITO_LOGOUTS"},
              {"ParameterKey": "CognitoUserPoolDomainPrefix","ParameterValue": "$COGNITO_DOMAIN_PREFIX"},
              {"ParameterKey": "GoogleClientId",             "ParameterValue": os.environ["GOOGLE_CLIENT_ID"]},
              {"ParameterKey": "GoogleClientSecret",         "ParameterValue": os.environ["GOOGLE_CLIENT_SECRET"]},
              {"ParameterKey": "AppleTeamId",                "ParameterValue": os.environ["APPLE_TEAM_ID"]},
              {"ParameterKey": "AppleKeyId",                 "ParameterValue": os.environ["APPLE_KEY_ID"]},
              {"ParameterKey": "AppleClientId",              "ParameterValue": os.environ["APPLE_CLIENT_ID"]},
              {"ParameterKey": "ApplePrivateKey",            "ParameterValue": os.environ["APPLE_PRIVATE_KEY"]},
              {"ParameterKey": "PublicSignup",               "ParameterValue": "true" if "$env" == "dev" else "false"},
              {"ParameterKey": "MonitoringEmail",            "ParameterValue": "alerts@urgd.dev"},
              {"ParameterKey": "CriticalAlertsEmail",        "ParameterValue": "critical@urgd.dev"},
          ]

          # Derive CF parameter key from function name:
          # urgd-pulse-getSettings -> strip "urgd-pulse-" -> "getSettings" -> "GetSettings" -> "GetSettingsCodeKey"
          code_params = []
          for fn in manifest['functions']:
              short = re.sub(r'^urgd-pulse-', '', fn)
              param_key = short[0].upper() + short[1:] + 'CodeKey'
              s3_key = manifest['s3_keys'][fn]
              code_params.append({"ParameterKey": param_key, "ParameterValue": s3_key})

          all_params = static_params + code_params
          with open('parameter-files/$env.json', 'w') as f:
              json.dump(all_params, f, indent=2)

          print(f"  ✅ $env.json — {len(code_params)} Lambda code keys")
          PYEOF
          done

      - name: Upload CloudFormation template and parameter files
        run: |
          set -euo pipefail
          aws s3 cp cloudformation/pulse-stack.yaml \
            "s3://${{ env.ARTIFACT_BUCKET }}/${{ env.APP_NAME }}/cloudformation/$VERSION/pulse-stack.yaml" \
            --region ${{ env.AWS_REGION }}

          aws s3 cp parameter-files/ \
            "s3://${{ env.ARTIFACT_BUCKET }}/${{ env.APP_NAME }}/cloudformation/$VERSION/" \
            --recursive --region ${{ env.AWS_REGION }}

          echo "✅ CloudFormation template and parameter files uploaded for version $VERSION"

      # Frontend is built in the deploy job after CF outputs are available
      # so VITE env vars (UserPoolId, UserPoolClientId, CognitoDomain) can be injected

  # ── 4. Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [version, build]
    permissions:
      id-token: write
      contents: read
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.environment }}" ]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENVIRONMENT="dev"
          else
            echo "❌ Invalid trigger"
            exit 1
          fi
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
          echo "Deploying to: $ENVIRONMENT"

      - name: Validate prod confirmation
        if: github.event.inputs.environment == 'prod'
        run: |
          if [ "${{ github.event.inputs.confirm_prod }}" != "DEPLOY" ]; then
            echo "❌ Production deployment requires confirm_prod = 'DEPLOY'"
            exit 1
          fi
          echo "✅ Production deployment confirmed"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/urgd-pulse-deploy
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Deploy CloudFormation stack
        run: |
          set -euo pipefail
          STACK_NAME="urgd-${{ env.APP_NAME }}-${ENVIRONMENT}"
          TEMPLATE_URL="https://${{ env.ARTIFACT_BUCKET }}.s3.${{ env.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}/cloudformation/$VERSION/pulse-stack.yaml"
          PARAM_FILE="/tmp/cf-params-${ENVIRONMENT}.json"

          echo "🚀 Deploying stack: $STACK_NAME"
          echo "   Template: $TEMPLATE_URL"

          # Download parameter file from S3 (generated and uploaded in build job)
          aws s3 cp \
            "s3://${{ env.ARTIFACT_BUCKET }}/${{ env.APP_NAME }}/cloudformation/$VERSION/${ENVIRONMENT}.json" \
            "$PARAM_FILE" \
            --region ${{ env.AWS_REGION }}

          SKIP_POLL=false
          if aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "Stack exists — updating..."
            UPDATE_OUTPUT=$(aws cloudformation update-stack \
              --stack-name "$STACK_NAME" \
              --template-url "$TEMPLATE_URL" \
              --parameters "file://$PARAM_FILE" \
              --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
              --region ${{ env.AWS_REGION }} 2>&1) || {
              if echo "$UPDATE_OUTPUT" | grep -q "No updates are to be performed"; then
                echo "✅ Stack already up to date — skipping poll"
                SKIP_POLL=true
              else
                echo "❌ Stack update failed: $UPDATE_OUTPUT"
                exit 1
              fi
            }
          else
            echo "Stack does not exist — creating..."
            aws cloudformation create-stack \
              --stack-name "$STACK_NAME" \
              --template-url "$TEMPLATE_URL" \
              --parameters "file://$PARAM_FILE" \
              --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
              --region ${{ env.AWS_REGION }}
          fi

          rm -f "$PARAM_FILE"
          echo "STACK_NAME=$STACK_NAME" >> $GITHUB_ENV
          echo "SKIP_POLL=$SKIP_POLL" >> $GITHUB_ENV

      - name: Poll for stack completion
        run: |
          set -euo pipefail
          if [ "${SKIP_POLL}" = "true" ]; then
            echo "⏭️  Skipping poll (no stack changes)"
            exit 0
          fi

          TIMEOUT=1800
          ELAPSED=0
          INTERVAL=30

          echo "⏳ Polling stack: $STACK_NAME"
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region ${{ env.AWS_REGION }} \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null)

            echo "   Status: $STATUS (${ELAPSED}s elapsed)"

            case "$STATUS" in
              CREATE_COMPLETE|UPDATE_COMPLETE)
                echo "✅ Stack deployment complete"
                exit 0
                ;;
              *FAILED*|*ROLLBACK*)
                echo "❌ Stack deployment failed: $STATUS"
                aws cloudformation describe-stack-events \
                  --stack-name "$STACK_NAME" \
                  --region ${{ env.AWS_REGION }} \
                  --query 'StackEvents[?ResourceStatus==`CREATE_FAILED` || ResourceStatus==`UPDATE_FAILED`].[LogicalResourceId,ResourceStatusReason]' \
                  --output table 2>/dev/null || true
                exit 1
                ;;
            esac

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "❌ Stack deployment timed out after ${TIMEOUT}s"
          exit 1

      - name: Validate CloudFormation outputs
        run: |
          set -euo pipefail
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region ${{ env.AWS_REGION }} \
              --query "Stacks[0].Outputs[?OutputKey==\`$1\`].OutputValue" \
              --output text
          }

          for key in CloudFrontDistributionId ApiGatewayId S3BucketName FrontendBucketName UserPoolId UserPoolClientId ApiBaseUrl CognitoDomain; do
            val=$(get_output "$key")
            if [ -z "$val" ] || [ "$val" = "None" ]; then
              echo "❌ Missing required output: $key"
              exit 1
            fi
            echo "   ✅ $key = $val"
            echo "CF_${key}=$val" >> $GITHUB_ENV
          done
          echo "✅ All required outputs present"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend with injected Cognito config
        run: |
          set -euo pipefail
          npm ci

          # Inject real CF outputs as VITE env vars so Amplify is configured correctly
          export VITE_USER_POOL_ID="$CF_UserPoolId"
          export VITE_USER_POOL_CLIENT_ID="$CF_UserPoolClientId"
          export VITE_COGNITO_DOMAIN="$CF_CognitoDomain"
          export VITE_API_BASE_URL="$CF_ApiBaseUrl"

          npm run build --workspace=apps/admin-ui
          npm run build --workspace=apps/session-ui
          echo "✅ Frontend built with live Cognito config"

      - name: Activate API Gateway deployment
        run: |
          set -euo pipefail
          DEPLOYMENT_ID=$(aws apigateway create-deployment \
            --rest-api-id "$CF_ApiGatewayId" \
            --stage-name "$ENVIRONMENT" \
            --description "Deploy $STACK_NAME @ $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --region ${{ env.AWS_REGION }} \
            --query 'id' \
            --output text)
          echo "✅ API Gateway deployment activated: $DEPLOYMENT_ID"

      - name: Deploy frontend assets
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-frontend.sh

          DIST_DIR=apps/admin-ui/dist S3_PREFIX=admin \
            ./scripts/deploy-frontend.sh "$CF_FrontendBucketName"

          # Also serve admin-ui from root so / is the entry point
          aws s3 cp apps/admin-ui/dist/index.html \
            "s3://${CF_FrontendBucketName}/index.html" \
            --cache-control "no-cache, max-age=0, must-revalidate" \
            --region ${{ env.AWS_REGION }}

          # Upload logo and favicon separately (not part of Vite build)
          if [ -f assets/logo.svg ]; then
            aws s3 cp assets/logo.svg \
              "s3://${CF_FrontendBucketName}/logo.svg" \
              --cache-control "public, max-age=31536000, immutable" \
              --region ${{ env.AWS_REGION }}
          fi
          if [ -f assets/favicon.svg ]; then
            aws s3 cp assets/favicon.svg \
              "s3://${CF_FrontendBucketName}/favicon.svg" \
              --cache-control "public, max-age=31536000, immutable" \
              --region ${{ env.AWS_REGION }}
          fi

          DIST_DIR=apps/session-ui/dist S3_PREFIX=s \
            ./scripts/deploy-frontend.sh "$CF_FrontendBucketName"

          echo "✅ Frontend deployed"

      - name: Configure AWS credentials (us-east-1 for WAF + CloudFront)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/urgd-pulse-deploy
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Associate WAF Web ACL with CloudFront
        run: |
          set -euo pipefail
          CLOUDFRONT_ID="$CF_CloudFrontDistributionId"

          WAF_ARN=$(aws ssm get-parameter \
            --name "/urgd/waf/web_acl_arn" \
            --query 'Parameter.Value' \
            --output text \
            --region us-east-1)

          if [ -z "$WAF_ARN" ] || [ "$WAF_ARN" = "None" ]; then
            echo "❌ WAF ARN not found in SSM: /urgd/waf/web_acl_arn"
            exit 1
          fi

          aws cloudfront get-distribution-config \
            --id "$CLOUDFRONT_ID" --output json > /tmp/cf-dist-response.json

          ETAG=$(jq -r '.ETag' /tmp/cf-dist-response.json)
          jq '.DistributionConfig' /tmp/cf-dist-response.json > /tmp/cf-dist-config.json
          jq --arg arn "$WAF_ARN" '.WebACLId = $arn' \
            /tmp/cf-dist-config.json > /tmp/cf-dist-config-updated.json

          aws cloudfront update-distribution \
            --id "$CLOUDFRONT_ID" \
            --distribution-config file:///tmp/cf-dist-config-updated.json \
            --if-match "$ETAG" >/dev/null

          echo "✅ WAF associated with CloudFront ($WAF_ARN)"

      - name: Register Shield callback
        run: |
          set -euo pipefail
          QUARANTINE_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ShieldQuarantineBucketName`].OutputValue' \
            --output text 2>/dev/null || echo "")

          if [ -z "$QUARANTINE_BUCKET" ] || [ "$QUARANTINE_BUCKET" = "None" ]; then
            echo "⚠️  ShieldQuarantineBucketName not in outputs — skipping Shield registration"
            exit 0
          fi

          python3 scripts/register-with-shield.py \
            --lambda-arn "$CF_ShieldCallbackLambdaArn" \
            --bucket-name "$QUARANTINE_BUCKET" \
            --environment "$ENVIRONMENT"

      - name: Invalidate CloudFront cache
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "$CF_CloudFrontDistributionId" \
            --paths "/*" \
            --region us-east-1 >/dev/null
          echo "✅ CloudFront cache invalidated"

      - name: Run smoke tests
        run: |
          set -euo pipefail
          chmod +x scripts/smoke.sh
          ./scripts/smoke.sh "$CF_ApiBaseUrl"

      - name: Cleanup old artifacts
        run: |
          set -euo pipefail
          echo "🧹 Cleaning up old artifacts (keeping last 5 versions)..."

          # Download manifest to get the list of functions that were built
          aws s3 cp \
            "s3://${{ env.ARTIFACT_BUCKET }}/lambda-packages/manifest-${VERSION}.json" \
            /tmp/lambda-manifest.json \
            --region ${{ env.AWS_REGION }}

          FUNCTIONS=$(python3 -c "import json; m=json.load(open('/tmp/lambda-manifest.json')); print(' '.join(m['functions']))")

          for fn in $FUNCTIONS; do
            aws s3 ls "s3://${{ env.ARTIFACT_BUCKET }}/lambda-packages/${fn}/" \
              --region ${{ env.AWS_REGION }} 2>/dev/null | \
              sort -r | tail -n +6 | awk '{print $4}' | \
              while read -r key; do
                if [ -n "$key" ]; then
                  echo "🗑️  Deleting s3://${{ env.ARTIFACT_BUCKET }}/lambda-packages/${fn}/${key}"
                  aws s3 rm "s3://${{ env.ARTIFACT_BUCKET }}/lambda-packages/${fn}/${key}" \
                    --region ${{ env.AWS_REGION }}
                fi
              done
          done

          # CloudFormation templates + parameter files
          aws s3 ls "s3://${{ env.ARTIFACT_BUCKET }}/${{ env.APP_NAME }}/cloudformation/" \
            --region ${{ env.AWS_REGION }} 2>/dev/null | \
            sort -r | tail -n +6 | awk '{print $2}' | \
            while read -r version_dir; do
              if [ -n "$version_dir" ]; then
                echo "🗑️  Deleting s3://${{ env.ARTIFACT_BUCKET }}/${{ env.APP_NAME }}/cloudformation/${version_dir}"
                aws s3 rm "s3://${{ env.ARTIFACT_BUCKET }}/${{ env.APP_NAME }}/cloudformation/${version_dir}" \
                  --recursive --region ${{ env.AWS_REGION }}
              fi
            done

          echo "✅ Cleanup complete"

      - name: Write deployment metadata
        run: |
          set -euo pipefail
          cat > metadata.json << EOF
          {
            "commit_sha": "${{ github.sha }}",
            "version": "$VERSION",
            "stack_name": "$STACK_NAME",
            "environment": "$ENVIRONMENT",
            "cloudfront_distribution_id": "$CF_CloudFrontDistributionId",
            "api_base_url": "$CF_ApiBaseUrl",
            "build_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "deployed_by": "${{ github.actor }}",
            "workflow_run": "${{ github.run_id }}"
          }
          EOF

          aws s3 cp metadata.json \
            "s3://${{ env.ARTIFACT_BUCKET }}/${{ env.APP_NAME }}/deployments/${ENVIRONMENT}/metadata.json" \
            --region ${{ env.AWS_REGION }}

          echo "✅ Deployment metadata written"
          cat metadata.json
